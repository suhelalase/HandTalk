version: "3.8"

services:
  api:
    build:
      context: ./apps/api
    container_name: handtalk-api
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./cnn8grps_rad1_model.h5:/app/model.h5:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    build: ./apps/web
    container_name: handtalk-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_WS_URL=ws://api:8001/ws
      - MURF_API_KEY=${MURF_API_KEY}
      - MURF_API_URL=${MURF_API_URL}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
