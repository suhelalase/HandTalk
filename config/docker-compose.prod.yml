version: "3.8"

services:
  api:
    image: ${DOCKER_USERNAME}/handtalk-api:${API_VERSION:-latest}
    container_name: handtalk-api-prod
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
      - ENV=production
    volumes:
      - ./cnn8grps_rad1_model.h5:/app/model.h5:ro
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  web:
    image: ${DOCKER_USERNAME}/handtalk-frontend:${WEB_VERSION:-latest}
    container_name: handtalk-web-prod
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-wss://yourdomain.com/ws}
      - MURF_API_KEY=${MURF_API_KEY}
      - MURF_API_URL=${MURF_API_URL}
      - NODE_ENV=production
    depends_on:
      api:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # Optional: Nginx reverse proxy for SSL/TLS
  nginx:
    image: nginx:alpine
    container_name: handtalk-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web
    restart: always
