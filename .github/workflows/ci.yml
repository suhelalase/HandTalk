name: Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Installing Frontend Dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build --workspace @handtalk/web

      - name: Use Python 3.11
        if: matrix.node-version == '20.x'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Backend Dependencies
        if: matrix.node-version == '20.x'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        working-directory: apps/api

      - name: Backend Import Check
        if: matrix.node-version == '20.x'
        run: python -c "import main"
        working-directory: apps/api

  unit-tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Installing Frontend Dependencies
        run: npm ci

      - name: Frontend Lint
        run: npm run lint --workspace @handtalk/web

      - name: Use Python 3.11
        if: matrix.node-version == '20.x'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Backend Dependencies
        if: matrix.node-version == '20.x'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        working-directory: apps/api

      - name: Backend Tests (if present)
        if: matrix.node-version == '20.x'
        run: |
          if [ -d "tests" ]; then pytest -q; else echo "No backend tests"; fi
        working-directory: apps/api
