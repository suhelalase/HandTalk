name: Deploy

on:
  workflow_run:
    workflows: ["Integration"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/handtalk-app:backend-latest
            ${{ secrets.DOCKERHUB_USERNAME }}/handtalk-app:backend-${{ github.event.workflow_run.head_sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          push: true
          build-args: |
            NEXT_PUBLIC_WS_URL=ws://localhost:8001/ws
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/handtalk-app:frontend-latest
            ${{ secrets.DOCKERHUB_USERNAME }}/handtalk-app:frontend-${{ github.event.workflow_run.head_sha }}
